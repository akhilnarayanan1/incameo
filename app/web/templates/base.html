{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    {% if title %}
        <title>{{ title }}</title>
    {% else %}
        <title>InCAMEO</title>
    {% endif %}
  </head>
  <body>
    {% block content %}{% endblock content %}
    <script src="{% static 'js/bootstrap.bundle.min.js' %}" ></script>
  </body>
</html>
