{% extends "base.html"%}
{% block content %}

<div class="card">
    <div class="card-body">
        {% csrf_token %}
    </div>
</div>

{% endblock content %} 



{% block script %}
<script>
    $('form#login').on('submit', (e)=>{
        const email = $("form#login input[name='email']").val();
        const password = $("form#login input[name='password']").val();
        login(email, password);
        e.preventDefault();
    });

    const login = (email, password) => {
        $.ajax({
            url: `${window.location.origin}/api/account/token/get/`,
            type: "POST",
            data: {email, password},
            success: function(response){
                console.log(response);
            },
            error: function(jXHR){
                console.log(jXHR.responseJSON, jXHR.status, jXHR.statusText, jXHR);
            }
        });
    };
</script>
{% endblock script %}
